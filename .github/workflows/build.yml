name: Build ScreenMaster Pro

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Windows x64 Build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt 6.6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: powershell

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package Release
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item "build\Release\ScreenMasterPro.exe" release\
          $qtBin = (Get-Command windeployqt.exe -ErrorAction SilentlyContinue).Source
          if (-not $qtBin) {
            $found = Get-ChildItem "C:\hostedtoolcache\windows\Qt" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $qtBin = $found.FullName }
          }
          if ($qtBin) {
            & $qtBin `
              --release `
              --no-translations `
              --multimedia `
              "release\ScreenMasterPro.exe"
          }
          Compress-Archive -Path release\* -DestinationPath ScreenMasterPro-Windows-x64.zip
        shell: powershell

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenMasterPro-Windows-x64
          path: ScreenMasterPro-Windows-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ScreenMasterPro-Windows-x64.zip
          generate_release_notes: true
